version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: awesome-notes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: awesome_notes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: awesome-notes-backend
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/awesome_notes
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: jwt-secret-key
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        flask db upgrade 2>/dev/null || flask db init && flask db migrate && flask db upgrade &&
        python run.py
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: awesome-notes-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
