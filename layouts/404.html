{{ define "main" }}
<main class="main" role="main">
  <article class="post-single" role="article">
    <header class="post-header">
      <h1 class="post-title">Page Not Found</h1>
    </header>
    <div class="post-content">
      <p>Just one more thing&hellip;</p>
      <p>
        I can't seem to find that page. It may have been moved, or maybe it was
        never here at all. You know how it is — things aren't always where you
        expect them.
      </p>
      <p style="margin-top: 2rem">
        <a
          href="/"
          style="
            display: inline-block;
            padding: 0.6em 1.4em;
            background-color: var(--accent);
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
          "
        >
          Back to Home
        </a>
      </p>
      <p style="margin-top: 1.5rem">
        Or try <a href="/search/">searching</a> for what you were looking for.
      </p>
    </div>
  </article>
</main>
{{ end }}
