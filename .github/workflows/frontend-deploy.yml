name: Deploy Frontend to AWS S3/CloudFront

on:
  push:
    branches: [ main, master ]
    paths:
      - 'awesome-notes/frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ./awesome-notes/frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./awesome-notes/frontend
      run: npm ci
    
    - name: Build
      working-directory: ./awesome-notes/frontend
      run: npm run build -- --configuration production
      env:
        PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Deploy to S3
      run: |
        aws s3 sync ./awesome-notes/frontend/dist/awesome-notes s3://${{ secrets.S3_BUCKET_NAME }} --delete
    
    - name: Invalidate CloudFront cache
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
