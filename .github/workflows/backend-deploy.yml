name: Deploy Backend to AWS Lambda

on:
  push:
    branches: [ main, master ]
    paths:
      - 'awesome-notes/backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      working-directory: ./awesome-notes/backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Deploy with Zappa
      working-directory: ./awesome-notes/backend
      run: |
        # Create zappa_settings.json from template if it doesn't exist
        if [ ! -f zappa_settings.json ]; then
          cp zappa_settings.example.json zappa_settings.json
        fi
        
        # Try to update, if it fails, deploy
        zappa update production || zappa deploy production
      env:
        DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
